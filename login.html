<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKMAT | Login</title>
    <!-- link bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- link font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- link external .css files -->
    <link rel="stylesheet" href="css/utility.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="container d-flex">
        <div class="lhs"></div>
        <form method="post" class="rhs rounded-4 shadow-sm">
            <div class="text-center">
                <img src="images/user.svg" class="ico mb-4">
            </div>
            <h2 class="heighlight mb-4">Login</h2>
            <div class="form-floating mb-4">
                <input type="text" class="form-control" id="floatingInput" placeholder="abc">
                <label for="floatingInput"><i class="fa-solid fa-user me-2"></i> Username</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                <label for="floatingPassword"><i class="fa-solid fa-lock me-2"></i> Password</label>
            </div>

            <div class="d-flex w-100 mb-4">
                <span class="me-4">Login as :</span>
                <div class="form-check form-switch me-4">
                    <input class="form-check-input" name="filter" type="radio" id="public" value="orignal" checked>
                    <label class="form-check-label pointer" for="public">Public</label>
                </div>
    
                <div class="form-check form-switch me-4">
                    <input class="form-check-input" name="filter" type="radio" id="polition" value="lofi">
                    <label class="form-check-label pointer" for="polition">Polition</label>
                </div>
    
                <div class="form-check form-switch me-4">
                    <input class="form-check-input" name="filter" type="radio" id="admin" value="slowed+rewerb">
                    <label class="form-check-label pointer" for="admin">Admin</label>
                </div>
            </div>

        <div class="text-center">
            <button type="submit" class="btn primary-btn mb-5 ps-4 pe-4"><i class="fa-solid fa-right-to-bracket pe-2"></i> Login</button>
        </div>
        <p class="text-center">I have not an account, i want to <a href="Register.html" class="heighlight">Register</a></p>
        </form>
    </div>



    
    <!-- link bootstrap .js bundel -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
